<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dancing Dashboard Toy Simulator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="main.js"></script>
</head>

<body>

<div class="container">

<header>
<h1>Dancing Dashboard Toy Simulator</h1>
<p>Vibration Driven Spring-Mass-Damper System</p>
</header>

<div class="grid">

<div class="panel controls">

<h2>Control Panel</h2>

<label>Mass (kg)</label>
<input id="mass" type="range" min="0.1" max="5" step="0.1" value="1">
<span id="massVal">1</span>

<label>Spring Stiffness (N/m)</label>
<input id="stiffness" type="range" min="10" max="500" step="1" value="100">
<span id="stiffnessVal">100</span>

<label>Damping (Ns/m)</label>
<input id="damping" type="range" min="0.1" max="50" step="0.1" value="5">
<span id="dampingVal">5</span>

<label>Input Frequency (Hz)</label>
<input id="freq" type="range" min="0.1" max="20" step="0.1" value="2">
<span id="freqVal">2</span>

<label>Force Amplitude (N)</label>
<input id="force" type="range" min="1" max="100" step="1" value="20">
<span id="forceVal">20</span>

</div>

<div class="panel simulation">

<h2>3D Simulation</h2>

<div id="canvas-container"></div>

</div>

<div class="panel metrics">

<h2>Metrics</h2>

<div class="metric">
Natural Frequency:
<span id="fn">0</span> Hz
</div>

<div class="metric">
Amplitude:
<span id="amp">0</span> m
</div>

<div class="metric">
Status:
<span id="status">Stable</span>
</div>

</div>

<div class="panel chart-panel">
<h2>Frequency Response</h2>
<canvas id="freqChart"></canvas>
</div>

<div class="panel chart-panel">
<h2>Time Response</h2>
<canvas id="timeChart"></canvas>
</div>

</div>

</div>

</body>
</html>
